name: Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php-version: [8.2, 8.3]
        database: [mysql, pgsql]

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: testing
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

      pgsql:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: password
          POSTGRES_DB: testing
        ports:
          - 5432:5432
        options: --health-cmd="pg_isready" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php-version }}
        extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, imagick
        coverage: xdebug

    - name: Copy .env
      run: php -r "file_exists('.env') || copy('.env.example', '.env');"

    - name: Install dependencies
      run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

    - name: Generate key
      run: php artisan key:generate

    - name: Directory Permissions
      run: chmod -R 777 storage bootstrap/cache

    - name: Create Database
      run: |
        mkdir -p database
        touch database/database.sqlite

    - name: Execute tests (Unit and Feature)
      env:
        DB_CONNECTION: ${{ matrix.database == 'mysql' && 'mysql' || 'pgsql' }}
        DB_DATABASE: testing
        DB_USERNAME: ${{ matrix.database == 'mysql' && 'root' || 'postgres' }}
        DB_PASSWORD: password
        DB_HOST: ${{ matrix.database == 'mysql' && '127.0.0.1' || '127.0.0.1' }}
        DB_PORT: ${{ matrix.database == 'mysql' && '3306' || '5432' }}
      run: php artisan test --testsuite=Unit,Feature --coverage --coverage-clover=coverage.xml

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  browser-tests:
    runs-on: windows-latest
    needs: test

    strategy:
      matrix:
        browser: [edge, chrome]

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: testing
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: 8.3
        extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, imagick

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install PHP dependencies
      run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

    - name: Install NPM dependencies
      run: npm ci

    - name: Copy .env
      run: php -r "file_exists('.env') || copy('.env.example', '.env');"

    - name: Generate key
      run: php artisan key:generate

    - name: Directory Permissions
      run: icacls . /grant Everyone:F /T

    - name: Create Database
      run: |
        mkdir -p database
        touch database/database.sqlite

    - name: Install Laravel Dusk
      run: composer require laravel/dusk --dev

    - name: Install Dusk
      run: php artisan dusk:install

    - name: Download Edge WebDriver
      if: matrix.browser == 'edge'
      run: |
        # Get Edge version
        $edgeVersion = (Get-ItemProperty "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\App Paths\msedge.exe").'(Default)' | Get-ItemProperty | Select-Object -ExpandProperty VersionInfo | Select-Object -ExpandProperty ProductVersion
        $edgeDriverVersion = $edgeVersion.Split('.')[0]
        Write-Host "Edge Version: $edgeVersion, Driver Version: $edgeDriverVersion"

        # Download Edge WebDriver
        $downloadUrl = "https://msedgedriver.azureedge.net/$edgeDriverVersion.0.0.0/edgedriver_win64.zip"
        Write-Host "Downloading Edge WebDriver from: $downloadUrl"
        Invoke-WebRequest -Uri $downloadUrl -OutFile "edgedriver.zip"

        # Extract Edge WebDriver
        Expand-Archive -Path "edgedriver.zip" -DestinationPath "." -Force
        Move-Item "msedgedriver.exe" "edgedriver.exe"

    - name: Download Chrome WebDriver
      if: matrix.browser == 'chrome'
      run: |
        # Get Chrome version
        $chromeVersion = (Get-ItemProperty "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\App Paths\chrome.exe").'(Default)' | Get-ItemProperty | Select-Object -ExpandProperty VersionInfo | Select-Object -ExpandProperty ProductVersion
        $chromeDriverVersion = $chromeVersion.Split('.')[0]
        Write-Host "Chrome Version: $chromeVersion, Driver Version: $chromeDriverVersion"

        # Download Chrome WebDriver
        $downloadUrl = "https://chromedriver.storage.googleapis.com/$chromeDriverVersion.0.0.0/chromedriver_win32.zip"
        Write-Host "Downloading Chrome WebDriver from: $downloadUrl"
        Invoke-WebRequest -Uri $downloadUrl -OutFile "chromedriver.zip"

        # Extract Chrome WebDriver
        Expand-Archive -Path "chromedriver.zip" -DestinationPath "." -Force

    - name: Start Edge WebDriver
      if: matrix.browser == 'edge'
      run: |
        Start-Process -FilePath "edgedriver.exe" -ArgumentList "--port=9516" -WindowStyle Hidden
        Start-Sleep -Seconds 3

    - name: Start Chrome WebDriver
      if: matrix.browser == 'chrome'
      run: |
        Start-Process -FilePath "chromedriver.exe" -ArgumentList "--port=9515" -WindowStyle Hidden
        Start-Sleep -Seconds 3

    - name: Run Edge Browser Tests
      if: matrix.browser == 'edge'
      run: php artisan dusk --browser=edge
      env:
        APP_ENV: testing
        DB_CONNECTION: sqlite
        DB_DATABASE: ":memory:"
        BROWSER: edge

    - name: Run Chrome Browser Tests
      if: matrix.browser == 'chrome'
      run: php artisan dusk --browser=chrome
      env:
        APP_ENV: testing
        DB_CONNECTION: sqlite
        DB_DATABASE: ":memory:"
        BROWSER: chrome

    - name: Upload Screenshots
      if: failure()
      uses: actions/upload-artifact@v3
      with:
        name: screenshots-${{ matrix.browser }}
        path: tests/Browser/screenshots/

  security-scan:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: 8.3

    - name: Install dependencies
      run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

    - name: Run security check
      run: composer audit

    - name: Run PHPStan
      run: |
        composer require --dev phpstan/phpstan
        ./vendor/bin/phpstan analyse --level=5 app/ packages/

  performance-test:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: testing
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: 8.3
        extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, imagick

    - name: Install dependencies
      run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

    - name: Copy .env
      run: php -r "file_exists('.env') || copy('.env.example', '.env');"

    - name: Generate key
      run: php artisan key:generate

    - name: Directory Permissions
      run: chmod -R 777 storage bootstrap/cache

    - name: Create Database
      run: |
        mkdir -p database
        touch database/database.sqlite

    - name: Run performance tests
      run: php artisan test --testsuite=Feature --filter=Performance
      env:
        DB_CONNECTION: mysql
        DB_DATABASE: testing
        DB_USERNAME: root
        DB_PASSWORD: password
        DB_HOST: 127.0.0.1
        DB_PORT: 3306

  coverage-report:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: 8.3
        extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, imagick
        coverage: xdebug

    - name: Install dependencies
      run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

    - name: Copy .env
      run: php -r "file_exists('.env') || copy('.env.example', '.env');"

    - name: Generate key
      run: php artisan key:generate

    - name: Directory Permissions
      run: chmod -R 777 storage bootstrap/cache

    - name: Create Database
      run: |
        mkdir -p database
        touch database/database.sqlite

    - name: Run tests with coverage
      run: php artisan test --coverage --coverage-html=storage/app/coverage

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

    - name: Comment PR with coverage
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const coverage = fs.readFileSync('storage/app/coverage/index.html', 'utf8');
          // Extract coverage percentage from HTML
          const match = coverage.match(/<td class="percent">(\d+\.?\d*)%<\/td>/);
          const percentage = match ? match[1] : 'Unknown';

          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `## Test Coverage Report 📊\n\n**Coverage: ${percentage}%**\n\n✅ All tests passed!\n\nView detailed coverage report in the artifacts.`
          });
